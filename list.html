<!DOCTYPE html>
<html>
<head>
<title>Todo App</title>

<style>

*{
box-sizing:border-box;
font-family:Arial;
}

body{
background:#eeeaff;
display:flex;
justify-content:center;
padding:20px;
}


.app{
width:360px;
background:white;
border-radius:30px;
overflow:hidden;
box-shadow:0 10px 30px #ccc;
}


.header{
background:#5630ff;
color:white;
padding:30px;
border-radius:0 0 40px 40px;
}


.header h2{
margin:0;
}


.days{
display:flex;
justify-content:space-between;
margin-top:25px;
}


.day{
background:#7055ff;
padding:10px;
border-radius:12px;
}


.active{
background:white;
color:#5630ff;
}


.content{
padding:20px;
}


.card{

background:white;
padding:15px;
margin:12px 0;
border-radius:18px;
box-shadow:0 3px 10px #ddd;

}


input{

width:70%;
padding:12px;
border-radius:20px;
border:1px solid #ddd;

}


button{

background:#5630ff;
color:white;
border:none;
padding:12px 18px;
border-radius:20px;

}


.done{

text-decoration:line-through;
opacity:.5;

}


</style>

</head>


<body>


<div class="app">


<div class="header">

<h2>Tuesday 25, Dec</h2>

<div class="days">

<div class="day">23</div>
<div class="day">24</div>
<div class="day active">25</div>
<div class="day">26</div>
<div class="day">27</div>

</div>

</div>



<div class="content">


<h2>Today</h2>


<div id="tasks"></div>


<input id="task" placeholder="New Task">

<button onclick="addTask()">+</button>



<h2>Tomorrow</h2>

<div class="card">
Do the homework
</div>

<div class="card">
Have lunch
</div>


</div>


</div>




<script>


function addTask(){

let text=document.getElementById("task");


if(text.value=="") return;


let div=document.createElement("div");


div.className="card";


div.innerHTML=
text.value+
" <button onclick='finish(this)'>✓</button>";


document.getElementById("tasks")
.appendChild(div);


text.value="";


}



function finish(btn){

btn.parentElement.classList.toggle("done");

}



</script>


</body>
</html>
